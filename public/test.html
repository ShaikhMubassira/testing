<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OTP One-Way WebRTC Test</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f6f7fb;
        color: #1d1d1f;
        margin: 0;
        padding: 24px;
      }
      .container {
        max-width: 980px;
        margin: 0 auto;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 16px;
      }
      .card {
        background: #fff;
        padding: 16px;
        border-radius: 12px;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
      }
      h1 {
        font-size: 22px;
        margin-bottom: 16px;
      }
      label {
        font-size: 12px;
        color: #586069;
        display: block;
        margin-bottom: 6px;
      }
      input, select, button {
        width: 100%;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid #d0d7de;
        margin-bottom: 10px;
        font-size: 14px;
        box-sizing: border-box;
      }
      button {
        background: #2f6feb;
        color: #fff;
        border: none;
        cursor: pointer;
      }
      button.secondary {
        background: #eaeef2;
        color: #1d1d1f;
      }
      button.danger {
        background: #d93f3f;
      }
      .row {
        display: flex;
        gap: 10px;
      }
      .row button {
        flex: 1;
      }
      .status {
        font-size: 13px;
        margin-bottom: 6px;
      }
      .otp {
        font-weight: bold;
        letter-spacing: 2px;
      }
      .log {
        background: #0b1220;
        color: #d0d7de;
        padding: 10px;
        border-radius: 10px;
        height: 140px;
        overflow: auto;
        font-size: 12px;
      }
      video {
        width: 100%;
        background: #111;
        border-radius: 10px;
        margin-bottom: 10px;
      }
      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>OTP One-Way WebRTC Test</h1>
      <div class="grid">
        <div class="card">
          <label>Server URL</label>
          <input id="serverUrl" placeholder="http://localhost:3000" />
          <div class="status" id="status">Status: disconnected</div>

          <label>Your OTP</label>
          <div class="status otp" id="otpValue">-</div>
          <div class="row">
            <button id="resetOtpBtn" class="secondary">Reset OTP</button>
          </div>
          <div class="log" id="log"></div>
        </div>

        <div class="card">
          <div id="requesterPane">
            <label>Target OTP</label>
            <input id="targetOtpInput" placeholder="Enter target OTP" />
            <div id="mediaControls" class="hidden">
              <div class="row">
                <label style="display:flex; align-items:center; gap:8px; margin-bottom:10px;">
                  <input id="micToggle" type="checkbox" checked style="width:auto; margin:0;" />
                  Mic
                </label>
                <label style="display:flex; align-items:center; gap:8px; margin-bottom:10px;">
                  <input id="videoToggle" type="checkbox" checked style="width:auto; margin:0;" />
                  Video
                </label>
              </div>
            </div>
            <button id="requestEndBtn" class="danger hidden">End Session</button>
          </div>

          <div id="targetPane">
            <div class="status hidden" id="incomingStatus">No requests</div>
          </div>
        </div>

        <div class="card">
          <label>Target Local Preview</label>
          <video id="localVideo" autoplay playsinline muted></video>
          <label>Requester Remote View</label>
          <video id="remoteVideo" autoplay playsinline></video>
        </div>
      </div>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
      const EVENTS = {
        REGISTER_USER: "register-user",
        REGISTERED: "registered",
        MONITOR_REQUEST: "monitor-request",
        REQUEST_SENT: "request-sent",
        INCOMING_REQUEST: "incoming-request",
        TARGET_RESPONSE: "target-response",
        REQUEST_ACCEPTED: "request-accepted",
        REQUEST_REJECTED: "request-rejected",
        TARGET_READY: "target-ready",
        OFFER: "offer",
        ANSWER: "answer",
        ICE_CANDIDATE: "ice-candidate",
        END_SESSION: "end-session",
        SESSION_ENDED: "session-ended",
        USER_LEFT: "user-left",
        ERROR: "error-message"
      };

      const STUN_CONFIG = {
        iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
      };

      const els = {
        serverUrl: document.getElementById("serverUrl"),
        status: document.getElementById("status"),
        otpValue: document.getElementById("otpValue"),
        resetOtpBtn: document.getElementById("resetOtpBtn"),
        log: document.getElementById("log"),
        requesterPane: document.getElementById("requesterPane"),
        targetPane: document.getElementById("targetPane"),
        mediaControls: document.getElementById("mediaControls"),
        targetOtpInput: document.getElementById("targetOtpInput"),
        incomingStatus: document.getElementById("incomingStatus"),
        requestEndBtn: document.getElementById("requestEndBtn"),
        micToggle: document.getElementById("micToggle"),
        videoToggle: document.getElementById("videoToggle"),
        localVideo: document.getElementById("localVideo"),
        remoteVideo: document.getElementById("remoteVideo")
      };

      let socket = null;
      let sessionId = null;
      let localStream = null;
      let peerConnection = null;
      let pendingCandidates = [];
      let isRegistered = false;
      let isRegistering = false;
      let pendingRegisterActions = [];
      let lastAutoRequestOtp = null;
      let autoRequestTimer = null;
      let localOtp = null;

      const log = (message) => {
        const line = document.createElement("div");
        line.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
        els.log.appendChild(line);
        els.log.scrollTop = els.log.scrollHeight;
      };

      const setStatus = (message) => {
        els.status.textContent = `Status: ${message}`;
      };

      const generateOtp = () => {
        let otp = "";
        for (let i = 0; i < 6; i += 1) {
          otp += Math.floor(Math.random() * 10).toString();
        }
        return otp;
      };

      const ensureLocalOtp = (forceNew = false) => {
        if (!localOtp || forceNew) {
          localOtp = generateOtp();
        }
        sessionStorage.setItem("demoOtp", localOtp);
        els.otpValue.textContent = localOtp;
        return localOtp;
      };

      const storeOtp = (otp) => {
        localOtp = otp;
        sessionStorage.setItem("demoOtp", otp);
        els.otpValue.textContent = otp;
      };

      const clearOtp = () => {
        sessionStorage.removeItem("demoOtp");
        localOtp = null;
        els.otpValue.textContent = "-";
        isRegistered = false;
        isRegistering = false;
      };

      const cleanupPeer = () => {
        pendingCandidates = [];
        if (peerConnection) {
          peerConnection.onicecandidate = null;
          peerConnection.ontrack = null;
          peerConnection.close();
          peerConnection = null;
        }
        if (localStream) {
          localStream.getTracks().forEach((track) => track.stop());
          localStream = null;
        }
        els.localVideo.srcObject = null;
        els.remoteVideo.srcObject = null;
      };

      const resetSession = () => {
        sessionId = null;
        cleanupPeer();
        els.incomingStatus.textContent = "No requests";
        lastAutoRequestOtp = null;
        els.requestEndBtn.classList.add("hidden");
        els.mediaControls.classList.add("hidden");
      };

      const ensurePeerConnection = () => {
        if (peerConnection) {
          return peerConnection;
        }
        peerConnection = new RTCPeerConnection(STUN_CONFIG);
        peerConnection.onicecandidate = (event) => {
          if (event.candidate && socket && sessionId) {
            socket.emit(EVENTS.ICE_CANDIDATE, {
              sessionId,
              candidate: event.candidate
            });
          }
        };
        peerConnection.ontrack = (event) => {
          els.remoteVideo.srcObject = event.streams[0];
        };
        pendingCandidates.forEach((candidate) => {
          peerConnection.addIceCandidate(candidate).catch(() => {});
        });
        pendingCandidates = [];
        return peerConnection;
      };

      const registerUser = () => {
        if (isRegistering) {
          log("Registration already in progress.");
          return;
        }
        isRegistering = true;
        isRegistered = false;

        const doRegister = () => {
          const otpToSend = ensureLocalOtp();
          socket.emit(EVENTS.REGISTER_USER, { otp: otpToSend });
          log(`Registering with OTP ${otpToSend}`);
        };

        if (!socket || !socket.connected) {
          log("Socket not connected — connecting now...");
          connectSocket();
          // Wait for socket to connect, then register
          if (socket && typeof socket.once === "function") {
            socket.once("connect", doRegister);
          } else {
            // Fallback: small delay then attempt register
            setTimeout(() => {
              if (socket && socket.connected) doRegister();
            }, 500);
          }
          return;
        }

        doRegister();
      };

      const ensureConnectedAndRegistered = (action) => {
        if (!socket || !socket.connected) {
          connectSocket();
          if (socket && typeof socket.once === "function") {
            socket.once("connect", () => ensureConnectedAndRegistered(action));
          }
          return;
        }

        if (isRegistered) {
          action();
          return;
        }

        pendingRegisterActions.push(action);
        if (!isRegistering) {
          registerUser();
        }
      };

      const sendMonitorRequest = (targetOtp) => {
        socket.emit(EVENTS.MONITOR_REQUEST, { targetOtp });
        log(`Request sent to OTP ${targetOtp}.`);
      };

      const acceptTargetRequest = async () => {
        if (!socket || !sessionId) {
          log("No incoming session.");
          return;
        }

        socket.emit(EVENTS.TARGET_RESPONSE, { sessionId, accept: true });
        log(`Request accepted. Session: ${sessionId}`);
        await startTargetMedia();
      };

      const connectSocket = () => {
        if (socket) {
          if (socket.connected) {
            log("Already connected.");
            return;
          }
          if (socket.io && socket.io.uri !== (els.serverUrl.value.trim() || window.location.origin)) {
            log("Socket URL changed. Recreating connection.");
            socket.removeAllListeners();
            socket.close();
            socket = null;
          } else {
            log("Socket already created. Reconnecting now.");
            socket.connect();
          }
          return;
        }
        const url = els.serverUrl.value.trim() || window.location.origin;
        socket = io(url, { transports: ["websocket"] });

        socket.on("connect", () => {
          setStatus("connected");
          log("Connected to server.");
          if (!isRegistered && !isRegistering) {
            registerUser();
          }
        });

        socket.on("connect_error", (err) => {
          setStatus("connect error");
          log(`Connect error: ${err && err.message ? err.message : "unknown"}`);
        });

        socket.on("disconnect", () => {
          setStatus("disconnected");
          log("Disconnected from server.");
          isRegistered = false;
          isRegistering = false;
          pendingRegisterActions = [];
          lastAutoRequestOtp = null;
          resetSession();
        });

        socket.on(EVENTS.REGISTERED, ({ otp }) => {
          storeOtp(otp);
          log(`Registered. OTP: ${otp}`);
          isRegistered = true;
          isRegistering = false;
          const actions = pendingRegisterActions.slice();
          pendingRegisterActions = [];
          actions.forEach((action) => action());
        });

        socket.on(EVENTS.REQUEST_SENT, ({ sessionId: id }) => {
          sessionId = id;
          els.requestEndBtn.classList.remove("hidden");
          els.mediaControls.classList.remove("hidden");
          log(`Request sent. Session: ${id}`);
        });

        socket.on(EVENTS.INCOMING_REQUEST, ({ sessionId: id, fromOtp }) => {
          sessionId = id;
          els.requestEndBtn.classList.add("hidden");
          els.mediaControls.classList.add("hidden");
          els.incomingStatus.textContent = `Incoming from ${fromOtp}`;
          log(`Incoming request from ${fromOtp}`);
          acceptTargetRequest().catch((err) => {
            log(`Auto-accept failed: ${err && err.message ? err.message : "unknown"}`);
          });
        });

        socket.on(EVENTS.REQUEST_ACCEPTED, ({ sessionId: id }) => {
          sessionId = id;
          els.requestEndBtn.classList.remove("hidden");
          els.mediaControls.classList.remove("hidden");
          log(`Request accepted. Session: ${id}`);
        });

        socket.on(EVENTS.REQUEST_REJECTED, ({ sessionId: id }) => {
          log(`Request rejected. Session: ${id}`);
          resetSession();
        });

        socket.on(EVENTS.TARGET_READY, ({ sessionId: id }) => {
          log(`Target ready. Session: ${id}`);
        });

        socket.on(EVENTS.OFFER, async ({ sessionId: id, offer }) => {
          sessionId = id;
          const pc = ensurePeerConnection();
          await pc.setRemoteDescription(offer);
          const answer = await pc.createAnswer();
          await pc.setLocalDescription(answer);
          socket.emit(EVENTS.ANSWER, { sessionId, answer });
          log("Offer received and answer sent.");
        });

        socket.on(EVENTS.ANSWER, async ({ answer }) => {
          if (!peerConnection) {
            return;
          }
          await peerConnection.setRemoteDescription(answer);
          log("Answer received.");
        });

        socket.on(EVENTS.ICE_CANDIDATE, ({ candidate }) => {
          if (!candidate) {
            return;
          }
          if (peerConnection) {
            peerConnection.addIceCandidate(candidate).catch(() => {});
          } else {
            pendingCandidates.push(candidate);
          }
        });

        socket.on(EVENTS.SESSION_ENDED, ({ reason }) => {
          log(`Session ended (${reason}).`);
          resetSession();
        });

        socket.on(EVENTS.USER_LEFT, ({ reason }) => {
          log(`User left (${reason}).`);
          resetSession();
        });

        socket.on(EVENTS.ERROR, ({ code, message }) => {
          log(`Error ${code}: ${message}`);
          if (code === "OTP_IN_USE") {
            clearOtp();
            isRegistering = false;
            isRegistered = false;
            ensureLocalOtp(true);
            registerUser();
          }
        });
      };

      const endCurrentSession = () => {
        if (!socket || !sessionId) {
          log("No active session.");
          return;
        }
        socket.emit(EVENTS.END_SESSION, { sessionId });
        resetSession();
        log("Session end requested.");
      };

      const maybeAutoRequest = () => {
        const rawOtp = els.targetOtpInput.value.trim();
        const targetOtp = rawOtp.replace(/\D/g, "");
        if (targetOtp.length < 6) {
          lastAutoRequestOtp = null;
          return;
        }
        if (targetOtp === lastAutoRequestOtp) {
          return;
        }
        lastAutoRequestOtp = targetOtp;
        ensureConnectedAndRegistered(() => sendMonitorRequest(targetOtp));
      };

      const startTargetMedia = async () => {
        if (!socket || !sessionId) {
          log("No active session.");
          return;
        }
        const micEnabled = Boolean(els.micToggle && els.micToggle.checked);
        const videoEnabled = Boolean(els.videoToggle && els.videoToggle.checked);
        const constraints = {
          video: videoEnabled,
          audio: micEnabled
        };
        if (!constraints.audio && !constraints.video) {
          log("Enable mic, video, or both before starting.");
          return;
        }
        try {
          localStream = await navigator.mediaDevices.getUserMedia(constraints);
        } catch (err) {
          if (err && err.name === "NotFoundError") {
            log("No matching camera/mic found. Try Audio only or check devices.");
            return;
          }
          if (err && err.name === "NotAllowedError") {
            log("Permission denied. Allow camera/mic in browser settings.");
            return;
          }
          if (err && err.name === "NotReadableError") {
            log("Device is busy. Close other apps using camera/mic.");
            return;
          }
          log(`getUserMedia failed: ${err && err.name ? err.name : "unknown"}`);
          return;
        }
        els.localVideo.srcObject = localStream;
        const pc = ensurePeerConnection();
        localStream.getTracks().forEach((track) => pc.addTrack(track, localStream));
        socket.emit(EVENTS.TARGET_READY, { sessionId });
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        socket.emit(EVENTS.OFFER, { sessionId, offer });
        log("Target ready and offer sent.");
      };

      els.resetOtpBtn.addEventListener("click", () => {
        clearOtp();
        log("Local OTP reset. Re-registering now.");
        registerUser();
      });
      els.targetOtpInput.addEventListener("input", () => {
        if (autoRequestTimer) {
          clearTimeout(autoRequestTimer);
        }
        autoRequestTimer = setTimeout(maybeAutoRequest, 300);
      });
      els.requestEndBtn.addEventListener("click", endCurrentSession);

      els.serverUrl.value = window.location.origin;
      sessionStorage.removeItem("demoOtp");
      ensureLocalOtp(true);
      connectSocket();
      registerUser();
    </script>
  </body>
</html>
